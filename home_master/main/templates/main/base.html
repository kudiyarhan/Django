{% load static %}

<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO мета-теги -->
  <title>{% block title %}Ремонт техники в Краснодаре — home-master.space{% endblock %}</title>
  <meta name="description"
    content="{% block meta_description %}Частный мастер по ремонту телевизоров, кофемашин, ноутбуков, телефонов и роботов-пылесосов в Краснодаре. Честные цены, гарантия на работу.{% endblock %}">
  <meta name="keywords"
    content="{% block meta_keywords %}ремонт техники Краснодар, ремонт телевизоров, ремонт кофемашин, частный мастер{% endblock %}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{ request.build_absolute_uri }}">

  <!-- Open Graph для соцсетей -->
  <meta property="og:title" content="{{ self.title }}">
  <meta property="og:description" content="{{ self.meta_description }}">
  <meta property="og:image"
    content="{% block og_image %}{{ request.scheme }}://{{ request.get_host }}{% static 'main/logo.svg' %}{% endblock %}">
  <meta property="og:url" content="{{ request.build_absolute_uri }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ru_RU">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{% static 'main/logo.svg' %}">

  <!-- Стили -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <style>
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="p-3 bg-white text-dark">
    <div class="container">
      <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">

        <!-- Логотип -->
        <a href="{% url 'main:index' %}" class="d-flex align-items-center mb-2 mb-lg-0 text-dark text-decoration-none">
          <img src="{% static 'logo.svg' %}" alt="home-master" width="80" height="64" class="me-2">
        </a>

        <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
          <li><a href="{% url 'main:index' %}" class="nav-link px-2 text-secondary">Главная</a></li>
          <li><a href="{% url 'blog:all_articles' %}" class="nav-link px-2 text-dark">Блог</a></li>
          <li><a href="{% url 'main:price' %}" class="nav-link px-2 text-dark">Цены</a></li>
          <li><a href="{% url 'main:about' %}" class="nav-link px-2 text-dark">О себе</a></li>
        </ul>

        <div class="text-end">
          <a href="tel:+79385106412" class="btn btn-outline-dark me-2">Позвонить мастеру</a>
        </div>
      </div>
    </div>
  </header>

  {% block body %}
  <!-- Здесь будет контент дочерних шаблонов -->
  {% endblock %}

          </li>
          <li class="nav-item"><a href="{% url 'blog:all_articles' %}"
              class="nav-link px-2 text-body-secondary">Блог</a></li>
          <li class="nav-item"><a href="{% url 'main:price' %}" class="nav-link px-2 text-body-secondary">Цены</a></li>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"></script>

</body>

</html>
